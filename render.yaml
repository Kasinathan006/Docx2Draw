services:
  - type: web
    name: doc2draw-backend
    env: docker
    dockerContext: .
    dockerfilePath: backend/Dockerfile
    plan: free
    # /health is a real GET endpoint defined in main.py
    healthCheckPath: /health
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      # CORS_ORIGINS is the correct key that config.py reads via pydantic-settings
      # "*" lets any Vercel preview URL through (security.py handles this safely)
      - key: CORS_ORIGINS
        value: "*"
